# ============================================================
# Keycloak MFA 開発環境 (顧客A: メールOTP)
# 起動: docker compose --env-file .env up -d
# MailHog WebUI: http://localhost:8025
# Keycloak Admin: http://localhost:8080  (admin / KEYCLOAK_ADMIN_PASSWORD)
# テストユーザー: realm-export.json 参照
# ============================================================
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak}
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      # --- DB ---
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
      # --- Admin ---
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # --- Hostname (開発環境用: strict無効) ---
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      # --- SMTP (realm-exportはenv展開非対応のためここで設定) ---
      # [FIX] SMTP設定の正本はここ（realm-export.json には持たせない）
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_HOST: ${KC_SMTP_HOST:-mailhog}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_PORT: ${KC_SMTP_PORT:-1025}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_FROM: ${KC_SMTP_FROM:-noreply@example.com}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_AUTH: ${KC_SMTP_AUTH:-false}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_SSL: ${KC_SMTP_SSL:-false}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_STARTTLS: ${KC_SMTP_TLS:-false}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
