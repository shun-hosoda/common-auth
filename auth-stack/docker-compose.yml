version: '3.8'

services:
  # Keycloak用PostgreSQL
  keycloak-db:
    image: postgres:16-alpine
    container_name: common-auth-keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: common-auth-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8080}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_LOG_LEVEL: INFO
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # SMTP for email delivery (password reset, email verification)
      KC_SPI_EMAIL_SMTP_HOST: ${SMTP_HOST:-}
      KC_SPI_EMAIL_SMTP_PORT: ${SMTP_PORT:-587}
      KC_SPI_EMAIL_SMTP_USER: ${SMTP_USER:-}
      KC_SPI_EMAIL_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      KC_SPI_EMAIL_SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      KC_SPI_EMAIL_SMTP_FROM_DISPLAY_NAME: ${SMTP_FROM_DISPLAY_NAME:-Common Auth}
      KC_SPI_EMAIL_SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      KC_SPI_EMAIL_SMTP_SSL: ${SMTP_SSL:-false}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep 'HTTP/1.1 200 OK' <&3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 業務DB用PostgreSQL（テスト・開発用）
  app-db:
    image: postgres:16-alpine
    container_name: common-auth-app-db
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-app_db}
      POSTGRES_USER: ${APP_DB_USER:-app_user}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-app_pass}
    ports:
      - "${APP_DB_PORT:-5433}:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-app_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  keycloak-db-data:
  app-db-data:

networks:
  auth-network:
    driver: bridge
