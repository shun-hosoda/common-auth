services:
  # Keycloak用PostgreSQL
  keycloak-db:
    image: postgres:16-alpine
    container_name: common-auth-keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: common-auth-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
      KC_HOSTNAME: http://${KEYCLOAK_HOSTNAME:-localhost}:${KEYCLOAK_PORT:-8080}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # SMTP for email delivery (password reset, email verification)
      # ローカル開発: MailHog (デフォルト) / 本番: 実SMTPサーバーに変更
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_HOST: ${SMTP_HOST:-mailhog}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_PORT: ${SMTP_PORT:-1025}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_USER: ${SMTP_USER:-}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_PASSWORD: ${SMTP_PASSWORD:-}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_FROM: ${SMTP_FROM:-noreply@example.com}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_FROM_DISPLAY_NAME: ${SMTP_FROM_DISPLAY_NAME:-Common Auth}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_AUTH: ${SMTP_AUTH:-false}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_STARTTLS: ${SMTP_STARTTLS:-false}
      KC_SPI_EMAIL_TEMPLATE_SMTP_SERVER_SSL: ${SMTP_SSL:-false}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes/common-auth:/opt/keycloak/themes/common-auth:ro
      - ./keycloak/providers:/opt/keycloak/providers:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep 'HTTP/1.1 200 OK' <&3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # 業務DB用PostgreSQL（テスト・開発用）
  app-db:
    image: postgres:16-alpine
    container_name: common-auth-app-db
    environment:
      POSTGRES_DB: ${APP_DB_NAME:-app_db}
      POSTGRES_USER: ${APP_DB_USER:-app_user}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-app_pass}
    ports:
      - "${APP_DB_PORT:-5433}:5432"
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-app_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ローカル開発用ダミーメールサーバー
  # メール確認: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: common-auth-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILHOG_UI_PORT:-8025}:8025"     # Web UI
    networks:
      - auth-network

volumes:
  keycloak-db-data:
  app-db-data:

networks:
  auth-network:
    driver: bridge
