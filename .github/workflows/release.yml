name: Release

on:
  push:
    tags:
      - "v*"   # v1.0.0, v1.1.0 などで発火

permissions:
  contents: write     # GitHub Release 作成

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Python backend-sdk のテスト & wheel ビルド → GitHub Release に添付
  # ──────────────────────────────────────────────────────────────────────────
  backend-sdk:
    name: Build & Release backend-sdk (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools & deps
        working-directory: packages/backend-sdk
        run: pip install build ".[dev]"

      - name: Run tests
        working-directory: packages/backend-sdk
        run: python -m pytest tests/ -v --tb=short

      - name: Sync version from git tag
        working-directory: packages/backend-sdk
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build wheel & sdist
        working-directory: packages/backend-sdk
        run: python -m build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/backend-sdk/dist/*.whl
            packages/backend-sdk/dist/*.tar.gz
          generate_release_notes: true
