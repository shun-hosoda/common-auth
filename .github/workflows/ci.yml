name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-sdk:
    name: backend-sdk (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: packages/backend-sdk
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: packages/backend-sdk
        run: ruff check src/ tests/

      - name: Test
        working-directory: packages/backend-sdk
        run: python -m pytest tests/ -v --tb=short --cov=src/common_auth --cov-report=term-missing

  frontend-sdk:
    name: frontend-sdk (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: packages/frontend-sdk
        run: npm ci

      - name: Typecheck
        working-directory: packages/frontend-sdk
        run: npx tsc --noEmit

      - name: Test
        working-directory: packages/frontend-sdk
        run: npm test -- --forceExit

  react-example:
    name: react-app build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: examples/react-app
        run: npm ci

      - name: Typecheck
        working-directory: examples/react-app
        run: npx tsc --noEmit

      - name: Build
        working-directory: examples/react-app
        run: npm run build
